name: Update Deployment

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
  
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.95.9
        with:
          extra_args: --results=verified,unknown
