---
- name: Create RACF users
  hosts: zoslab
  gather_facts: false

  environment: "{{ environment_vars }}"

  collections:
    - ibm.ibm_zos_core

  vars_files:
    - vars/users.yml
    - vars/datasets.yml

  tasks:
    - name: Generate RACF user creation JCL
      ansible.builtin.template:
        src: templates/create_users.jcl.j2
        dest: /tmp/create_users.jcl
        mode: "0600"
      delegate_to: localhost
      no_log: false

    - name: Submit generated JCL
      zos_job_submit:
        src: /tmp/create_users.jcl
        location: LOCAL
        wait: true
        wait_time_s: 60
        return_output: true
      register: job_result
      no_log: false

    - name: Create seed libraries
      zos_data_set:
        name: "{{ item.dataset }}"
        state: present
        type: pdse
        record_format: fb
        record_length: 80
        block_size: 3120
        space_primary: 5
        space_secondary: 2
        space_type: trk
      loop: "{{ seed_libraries }}"

    - name: Find seed files
      ansible.builtin.find:
        paths: "{{ playbook_dir }}/playbooks/seed_files"
        file_type: file
      delegate_to: localhost
      register: seed_files

    - name: Show number of seed files found
      debug:
        msg: "Found {{ seed_files.files | length }} seed files"

    - name: Copy seed files into datasets
      zos_copy:
        src: "{{ item.path }}"
        dest: "TEAM02.SEED.{{ item.path.split('/')[-2] }}({{ item.path.split('/')[-1].split('.')[0] }})"
        remote_src: false
      loop: "{{ seed_files.files }}"

    - name: Show file mappings
      debug:
        msg: >-
          {{ item.path }}
          ->
          TEAM02.SEED.{{ item.path.split('/')[-2] }}
          ({{ item.path.split('/')[-1].split('.')[0] }})
      loop: "{{ seed_files.files }}"